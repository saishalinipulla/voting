{% extends "base.html" %}
{% block title %}Forgot Password · Online Voting System{% endblock %}
{% block content %}
<div class="card-center">
  <div class="card">
    <p class="eyebrow">Account Recovery</p>
    <h1 class="card-title">Forgot Password?</h1>
    <p class="card-desc">
      Enter your registered email or PIN. We'll send a reset code to the
      email on file.
    </p>

    <form method="POST" action="{{ url_for('forgot_password') }}">
      <div class="field">
        <label for="identifier">Email or PIN</label>
        <input id="identifier" name="identifier" required placeholder="you@example.com or 1024" />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Send Reset Code</button>
    </form>

    <p class="fine-links"><a href="{{ url_for('login') }}">&larr; Back to login</a></p>
  </div>
</div>
{% endblock %}
