{% extends "base.html" %}
{% block title %}Log In · Online Voting System{% endblock %}
{% block content %}
<div class="card-center">
  <div class="card">
    <p class="eyebrow">Voter Access</p>
    <h1 class="card-title">Log In</h1>
    <p class="card-desc">Enter the PIN and password you registered with.</p>

    <form method="POST" action="{{ url_for('login') }}">
      <div class="field">
        <label for="pin">PIN</label>
        <input id="pin" name="pin" class="mono" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Log In</button>
    </form>

    <p class="fine-links">
      <a href="{{ url_for('forgot_password') }}">Forgot your password?</a>
    </p>

    <p class="fine-links">
      New here? <a href="{{ url_for('signup') }}">Create a voter account</a>
    </p>
    <p class="fine-links"><a href="{{ url_for('home') }}">&larr; Back to home</a></p>
  </div>
</div>
{% endblock %}
