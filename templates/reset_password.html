{% extends "base.html" %}
{% block title %}Reset Password · Online Voting System{% endblock %}
{% block content %}
<div class="card-center">
  <div class="card">
    <p class="eyebrow">Account Recovery</p>
    <h1 class="card-title">Reset Your Password</h1>
    <p class="card-desc">Enter the code emailed to you, along with your new password.</p>

    <form method="POST" action="{{ url_for('reset_password') }}">
      <div class="field">
        <label for="pin">Your PIN</label>
        <input id="pin" name="pin" class="mono" value="{{ pin }}" required />
      </div>
      <div class="field">
        <label for="otp">Reset Code</label>
        <input id="otp" name="otp" class="mono" maxlength="6" required />
      </div>
      <div class="field">
        <label for="password">New Password</label>
        <input id="password" name="password" type="password" required />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
    </form>

    <p class="fine-links">
      Didn't get a code? <a href="{{ url_for('forgot_password') }}">Request again</a>
    </p>
    <p class="fine-links"><a href="{{ url_for('login') }}">&larr; Back to login</a></p>
  </div>
</div>
{% endblock %}
