services:
  - type: web
    name: online-voting-system
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USE_TLS
        value: true
      - key: MAIL_USERNAME
        value: your-gmail@gmail.com
      - key: MAIL_PASSWORD
        value: your-16-char-app-password
      - key: MAIL_DEFAULT_SENDER
        value: your-gmail@gmail.com
      - key: DATABASE_URL
        fromDatabase:
          name: voting-db
          property: connectionString

databases:
  - name: voting-db
    plan: free
